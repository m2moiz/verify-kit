header:
  license:
    spdx-id: MIT
    copyright-owner: Moiz
    software-name: verify-kit
    # Short-form MIT header. Full text lives in LICENSE at repo root; this is
    # the SPDX-style attribution line that real OSS projects use to keep
    # per-file noise minimal while preserving copyright on every source file.
    content: |
      Copyright (c) 2026 Moiz
      SPDX-License-Identifier: MIT

  paths:
    - "src/**/*.py"
    - "template_extensions/**/*.py"
    - "tests/**/*.py"
    - ".github/workflows/*.yml"
    - ".claude/hooks/*.sh"
    - "docs/casts/*.sh"

  # Files / directories deliberately out of scope for this check.
  # See PR description and bead verify-kit-72e for rationale.
  paths-ignore:
    # Jinja templates inherit headers from the rendered consumer project; the
    # consumer's own LICENSE governs the output, not verify-kit's. Handled
    # separately if/when we decide to inject headers into select template files.
    - "template/**"
    # Planning artifacts and internal docs.
    - ".planning/**"
    - "research/**"
    - "docs/**/*.md"
    # Build / cache / vendor.
    - ".venv/**"
    - "**/__pycache__/**"
    - "**/.pytest_cache/**"
    - "**/.ruff_cache/**"
    - "**/.hypothesis/**"
    - "dist/**"
    - "node_modules/**"
    - ".git/**"
    # Lockfiles and autogenerated config.
    - "uv.lock"
    - "**/*.lock"
    - ".release-please-manifest.json"
    - "release-please-config.json"
    # Docs and license artifacts.
    - "**/*.md"
    - "**/*.txt"
    - "LICENSE"
    - "NOTICE"
    # Config files where headers feel wrong or actively break parsers.
    - "pyproject.toml"
    - ".gitignore"
    - ".mise.toml"
    - "copier.yml"
    - "lychee.toml"
    - ".slopcheck"
    - ".licenserc.yaml"

  comment: on-failure
