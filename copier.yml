# verify-kit Copier configuration
#
# Template structure: all generated content lives under template/ (Area 1).
# Copier renders .jinja2-suffixed files and strips the suffix from output names.

_subdirectory: template
_jinja_extensions:
  # Use copier-template-extensions loader so the env_detect extension can live
  # adjacent to copier.yml without requiring users to pip-install
  # template_extensions globally. Users must install Copier with this companion:
  #   uv tool install copier --with copier-template-extensions
  - copier_template_extensions.TemplateExtensionLoader
  - template_extensions/env_detect.py:EnvDetectExtension
_answers_file: .copier-answers.yml
_templates_suffix: .jinja2
_min_copier_version: "9.4"
_envops:
  keep_trailing_newline: true
  lstrip_blocks: true
  trim_blocks: true

# ── Add-on file exclusion (PRIMARY gate for has_backend / has_db) ────────────
# When the flag is false, every path listed below is excluded from the
# rendered output. This is the authoritative gate; Jinja path conditionals
# in the template tree are defense-in-depth only. See Phase 4 REVIEWS item #1.
_exclude:
  - "*.pyc"
  - "__pycache__"
  - ".git"
  - "{% if not has_backend %}app{% endif %}"
  - "{% if not has_backend %}app/**{% endif %}"
  - "{% if not has_backend %}tests/backend{% endif %}"
  - "{% if not has_backend %}tests/backend/**{% endif %}"
  - "{% if not has_backend %}Dockerfile{% endif %}"
  - "{% if not has_backend %}docker-compose.yml{% endif %}"
  - "{% if not has_backend %}.dockerignore{% endif %}"
  - "{% if not has_db %}alembic{% endif %}"
  - "{% if not has_db %}alembic/**{% endif %}"
  - "{% if not has_db %}alembic.ini{% endif %}"
  - "{% if not has_llm %}harness/llm.py{% endif %}"
  - "{% if not has_llm %}harness/checks/eval.py{% endif %}"
  - "{% if not has_llm %}eval{% endif %}"
  - "{% if not has_llm %}eval/**{% endif %}"
  - "{% if not has_llm %}tests/llm{% endif %}"
  - "{% if not has_llm %}tests/llm/**{% endif %}"
  - "{% if not has_llm %}tests/cassettes/.gitkeep{% endif %}"
  - "{% if not has_llm %}docker-compose.langfuse.yml{% endif %}"
  - "{% if not has_llm %}.github/workflows/nightly-eval.yml{% endif %}"
  - "{% if not has_llm and not has_backend %}/.env.example{% endif %}"
  - "{% if not has_llm and not has_backend %}/.env.example.jinja2{% endif %}"
  - "{% if llm_backend != 'langfuse-self-host' %}docker-compose.langfuse.yml{% endif %}"
  - "{% if not has_web %}web{% endif %}"
  - "{% if not has_web %}web/**{% endif %}"
  - "{% if not has_web %}web/.*{% endif %}"
  - "{% if not has_web %}web/**/.*{% endif %}"
  - "{% if not has_web %}web/.vscode{% endif %}"
  - "{% if not has_web %}web/.vscode/**{% endif %}"
  - "{% if not has_web %}harness/web{% endif %}"
  - "{% if not has_web %}harness/web/**{% endif %}"
  - "{% if not has_web %}harness/web/.*{% endif %}"
  - "{% if not has_web %}harness/web/**/.*{% endif %}"
  - "{% if not has_web %}harness/checks/web.py{% endif %}"
  - "{% if not has_web %}tests/web{% endif %}"
  - "{% if not has_web %}tests/web/**{% endif %}"
  - "{% if not has_backend or not has_web %}web/src/lib/events.ts{% endif %}"
  - "{% if not has_backend or not has_web %}web/src/__tests__/events.test.ts{% endif %}"
  - "{% if not has_backend or not has_web %}web/tests/e2e/sse.spec.ts{% endif %}"

_message_before_copy: "Welcome to verify-kit. ~10 prompts grouped as Identity / Agent integrations / Add-ons / Optional."
_message_after_copy: |
  Next: cd into your project, run `mise install`, then `just verify`.

  Add-ons selected:
  - has_backend={{ has_backend }}: FastAPI app under app/ + `just verify-backend`
  - has_db={{ has_db }}: SQLAlchemy + Alembic + Testcontainers
  - has_logfire={{ has_logfire }}: Logfire auto-tracing
  - has_fastapi_mcp={{ has_fastapi_mcp }}: FastAPI-MCP mount
  - has_web={{ has_web }}: Vite + React + Tailwind v4 + shadcn under web/ + harness/web/ adapters

# Post-render tasks. Run in order; failures abort the scaffold.
#
# 1. Make shipped shell scripts executable. `2>/dev/null || true` swallows the
#    case where has_claude_code=false makes the hook paths absent. The
#    scripts/ralph.sh wrapper is shipped unconditionally.
# 2. Auto-format the rendered output. Jinja `{% if %}` blocks that render to
#    nothing can leave stacked blank lines that `ruff format` rejects; running
#    the formatter once on the output normalizes them without requiring
#    per-block whitespace control in every template file. Uses `uvx ruff` so
#    no scaffold venv or dev-group sync is needed at copy time. The
#    `|| true` keeps scaffolding resilient if ruff/uv is unavailable —
#    `just verify` will surface any real format issues at the consumer's
#    first run.
#
# NOTE: there is deliberately NO `corepack enable pnpm` task. pnpm is
# provisioned by mise at the EXACT version pinned in .mise.toml
# (pnpm = "9.15.0"), which matches web/package.json's `packageManager` field.
# mise and corepack both managing pnpm conflict — corepack's shim refuses to
# switch versions ("pnpm does not switch versions under corepack") whenever
# the installed pnpm differs from the pin, which broke the harness web-build
# subprocess (verify-kit-49l). Letting mise own pnpm avoids the conflict.
_tasks:
  - "chmod +x .claude/hooks/post-tool-use.sh .claude/hooks/stop.sh scripts/ralph.sh 2>/dev/null || true"
  - "uvx --quiet ruff format . 2>/dev/null || true"

# ── Group: Identity ──────────────────────────────────────────────────────────

project_name:
  type: str
  help: "Human-readable project name (e.g. 'My Cool App'). Used in README and docs only."

project_description:
  type: str
  help: "One-sentence description of what this project does."

author_name:
  type: str
  help: "Your full name (used in LICENSE and package metadata)."

author_email:
  type: str
  help: "Your email address (used in package metadata)."

license:
  type: str
  help: "Open-source license for the generated project."
  choices:
    - MIT
    - Apache-2.0
    - BSD-3-Clause
    - Unlicense
  default: MIT

# Derived (computed) identity prompts — NOT shown to the user (when: false).
# project_name is a free-form human string and is NOT a valid PEP 621 package
# name. These two prompts derive safe identifiers from it via Jinja regex.
# The regex_replace filter is provided by jinja2-ansible-filters (Copier 9 dep).

project_slug:
  type: str
  help: "PEP 621 / package name slug derived from project_name (kebab-case)."
  when: false
  default: "{{ project_name | lower | regex_replace('[^a-z0-9]+', '-') | regex_replace('^-+|-+$', '') }}"

package_name:
  type: str
  help: "Python import name derived from project_slug (snake_case)."
  when: false
  default: "{{ project_slug | replace('-', '_') }}"

# ── Group: Agent integrations ─────────────────────────────────────────────────
# Defaults auto-detected from user's home directory via the env_detect Jinja filter
# (template_extensions/env_detect.py). The common case is "press Enter" when the
# tool is already installed.

has_claude_code:
  type: bool
  help: "Include Claude Code conventions (CLAUDE.md, .claude/ hooks). Auto-detected: ~/.claude/ exists."
  default: "{{ 'claude_code' | env_detect }}"

has_cursor:
  type: bool
  help: "Include Cursor rules (.cursor/rules/verify-kit.mdc). Auto-detected: ~/.cursor/ exists."
  default: "{{ 'cursor' | env_detect }}"

has_windsurf:
  type: bool
  help: "Include Windsurf rules (.windsurf/rules/verify-kit.md). Auto-detected: ~/.codeium/windsurf/ exists."
  default: "{{ 'windsurf' | env_detect }}"

has_copilot:
  type: bool
  help: "Include GitHub Copilot instructions (.github/copilot-instructions.md). Auto-detected: ~/.config/github-copilot/ exists."
  default: "{{ 'copilot' | env_detect }}"

has_zed:
  type: bool
  help: "Include Zed AI context (.zed/settings.json context_servers). Auto-detected: ~/.config/zed/ exists."
  default: "{{ 'zed' | env_detect }}"

has_continue:
  type: bool
  help: "Include Continue MCP config (.continue/mcpServers/). Auto-detected: ~/.continue/ exists."
  default: "{{ 'continue' | env_detect }}"

# ── Group: Add-ons ────────────────────────────────────────────────────────────

has_backend:
  type: bool
  help: "Include FastAPI + Postgres backend add-on (phases 4+)."
  default: true

has_llm:
  type: bool
  help: "Include LLM integration add-on with pydantic-ai, LiteLLM, Langfuse (phases 5+)."
  default: true

has_logfire:
  type: bool
  help: "Enable Logfire auto-tracing for Anthropic/OpenAI calls (requires has_backend)."
  default: false
  when: "{{ has_backend }}"

has_fastapi_mcp:
  type: bool
  help: "Mount verify-kit's MCP server directly into the FastAPI app (3-line setup, requires has_backend)."
  default: false
  when: "{{ has_backend }}"

has_db:
  type: bool
  help: "Include SQLAlchemy + asyncpg + Alembic database layer (requires has_backend)."
  default: true
  when: "{{ has_backend }}"

has_web:
  type: bool
  help: "Include the web add-on (Vite + React + TS + Tailwind v4 + shadcn under web/, plus harness/web/ adapters)?"
  default: false

llm_backend:
  type: str
  help: "LLM observability backend (requires has_llm)."
  choices:
    - langfuse-cloud
    - langfuse-self-host
    - none
  default: langfuse-cloud
  when: "{{ has_llm }}"

# ── Group: Optional ───────────────────────────────────────────────────────────

has_devcontainer:
  type: bool
  help: "Include .devcontainer/devcontainer.json with mise Feature (opt-in only)."
  default: false
