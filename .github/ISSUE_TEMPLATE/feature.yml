name: Feature request
description: Propose a new capability, add-on slot, or enhancement to verify-kit.
title: "[Feature]: "
labels: [enhancement, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature! verify-kit is a solo-maintained portfolio
        project, so concrete proposals with clear use cases get prioritized.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem does this solve? What's broken or missing today?
      placeholder: |
        When I scaffold a project with `has_llm=true`, I have no way to ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would this work? What new Copier prompt, file, or check ships?
      placeholder: |
        Add a `has_redis` prompt that generates docker-compose entries plus a
        `harness/checks/redis.py` health check.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other shapes you weighed and why this one wins (optional).
    validations:
      required: false

  - type: checkboxes
    id: willingness
    attributes:
      label: Willingness to implement
      description: Helpful but not required.
      options:
        - label: I'd like to try implementing this myself and open a PR.
        - label: I can help test a candidate implementation.
