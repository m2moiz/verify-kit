name: sbom-sign
# Generates an SPDX SBOM and signs both the SBOM and source tarball with
# Sigstore keyless signing. This is supply-chain posture for verify-kit's
# template repo, not runtime protection for a shipped binary artifact.

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: write

jobs:
  sbom-and-sign:
    name: SBOM and Sigstore signing
    runs-on: ubuntu-latest
    env:
      CERTIFICATE_IDENTITY_REGEXP: >-
        ^https://github.com/${{ github.repository }}/\.github/workflows/sbom-sign\.yml@refs/heads/main$
      CERTIFICATE_OIDC_ISSUER: https://token.actions.githubusercontent.com
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          path: .

      - name: Generate source tarball
        run: git archive --format=tar.gz HEAD > verify-kit-source.tar.gz

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign SBOM and source tarball
        run: |
          cosign sign-blob --yes \
            --output-signature sbom.spdx.json.sig \
            --output-certificate sbom.spdx.json.pem \
            sbom.spdx.json

          cosign sign-blob --yes \
            --output-signature verify-kit-source.tar.gz.sig \
            --output-certificate verify-kit-source.tar.gz.pem \
            verify-kit-source.tar.gz

      - name: Verify signatures
        run: |
          # TODO: If release/workflow_dispatch identities differ on first run,
          # update this regexp from the cosign verification error per Decision 4.
          cosign verify-blob \
            --signature sbom.spdx.json.sig \
            --certificate sbom.spdx.json.pem \
            --certificate-identity-regexp "$CERTIFICATE_IDENTITY_REGEXP" \
            --certificate-oidc-issuer "$CERTIFICATE_OIDC_ISSUER" \
            sbom.spdx.json

          cosign verify-blob \
            --signature verify-kit-source.tar.gz.sig \
            --certificate verify-kit-source.tar.gz.pem \
            --certificate-identity-regexp "$CERTIFICATE_IDENTITY_REGEXP" \
            --certificate-oidc-issuer "$CERTIFICATE_OIDC_ISSUER" \
            verify-kit-source.tar.gz

      - name: Upload SBOM, source, signatures, and certificates
        uses: actions/upload-artifact@v7
        with:
          name: sbom-and-signatures
          path: |
            sbom.spdx.json
            sbom.spdx.json.sig
            sbom.spdx.json.pem
            verify-kit-source.tar.gz
            verify-kit-source.tar.gz.sig
            verify-kit-source.tar.gz.pem
          retention-days: 90
