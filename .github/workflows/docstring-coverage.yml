name: docstring-coverage
# Runs interrogate against src/verify_kit on every PR + push to main.
# Threshold and scope live in pyproject.toml under [tool.interrogate].
# Directional signal: fail-under=80 catches regressions without forcing
# docstring writing on trivial code changes.
#
# Reference: https://github.com/econchick/interrogate
on:
  pull_request:
    paths:
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/docstring-coverage.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pyproject.toml"

permissions:
  contents: read

jobs:
  interrogate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Run interrogate
        # Config (paths, threshold, ignores) is read from pyproject.toml.
        # We pass src/verify_kit explicitly so changes to the config's
        # scope don't silently expand the audit surface in CI.
        run: uv tool run interrogate src/verify_kit
