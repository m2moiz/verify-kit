name: actionlint
# Lints all GitHub Actions workflow YAML on every PR and push to main.
# Catches YAML typos, undefined action inputs, shellcheck issues inside
# run: blocks, and unpinned third-party actions before they cause a real
# CI failure. Sub-second runtime.
#
# Reference: https://github.com/rhysd/actionlint
on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.yaml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.yaml"

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.7
        with:
          # -color forces ANSI output, -shellcheck= turns off the shellcheck
          # integration since it's redundant with our existing ruff/pyright
          # gates and emits noisy warnings on heredoc usage we use deliberately.
          args: "-color -shellcheck="
